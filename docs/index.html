<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agentic AI Ecosystem — Taxonomy Map</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --bg:#0b0d10; --panel:#12161c; --panel2:#171c24; --border:#222a35;
    --text:#e7ecf3; --muted:#8a94a6; --accent:#7cc4ff; --accent2:#ffb86b;
    --link:#9ad1ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    height:100%;overflow:hidden}
  a{color:var(--link);text-decoration:none}
  a:hover{text-decoration:underline}
  header{padding:14px 20px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  header h1{margin:0;font-size:16px;font-weight:600;letter-spacing:.2px}
  header .stats{color:var(--muted);font-size:12px}
  header .search{margin-left:auto;display:flex;gap:8px;align-items:center}
  header input{background:var(--panel2);border:1px solid var(--border);
    color:var(--text);padding:7px 10px;border-radius:6px;width:260px;
    font:inherit;outline:none}
  header input:focus{border-color:var(--accent)}
  header .links{color:var(--muted);font-size:12px}
  main{display:grid;grid-template-columns:1fr 420px;height:calc(100vh - 55px)}
  #viz{position:relative;overflow:hidden}
  #viz svg{display:block;width:100%;height:100%}
  #viz .hint{position:absolute;bottom:12px;left:16px;color:var(--muted);
    font-size:11px;pointer-events:none}
  aside{border-left:1px solid var(--border);background:var(--panel);
    overflow-y:auto;padding:18px 22px}
  .crumbs{color:var(--muted);font-size:12px;margin-bottom:6px}
  .crumbs span{color:var(--text)}
  .crumbs a{cursor:pointer}
  h2.cat-name{margin:2px 0 10px;font-size:20px;font-weight:600}
  .desc-short{color:var(--text);font-size:14px;margin:0 0 10px}
  .desc-long{color:var(--muted);font-size:13px;margin:0 0 14px}
  .narrative{color:var(--muted);font-size:12px;font-style:italic;
    padding:10px 12px;background:var(--panel2);border-left:2px solid var(--accent);
    border-radius:4px;margin:0 0 14px}
  .section-label{color:var(--muted);font-size:11px;text-transform:uppercase;
    letter-spacing:.8px;margin:18px 0 8px}
  ul.children,ul.projects{list-style:none;padding:0;margin:0}
  ul.children li{padding:7px 10px;border-radius:5px;cursor:pointer;
    display:flex;justify-content:space-between;gap:10px;color:var(--text)}
  ul.children li:hover{background:var(--panel2)}
  ul.children li .count{color:var(--muted);font-size:11px}
  ul.projects li{padding:6px 0;border-bottom:1px solid var(--border)}
  ul.projects li:last-child{border:none}
  ul.projects a{font-size:13px}
  .empty{color:var(--muted);font-style:italic;font-size:12px}
  #tree-pane{position:absolute;left:12px;top:12px;background:rgba(18,22,28,.92);
    border:1px solid var(--border);border-radius:8px;padding:10px 12px;
    max-height:calc(100% - 24px);overflow-y:auto;width:260px;font-size:12px;
    backdrop-filter:blur(8px)}
  #tree-pane .t-top{font-weight:600;color:var(--text);cursor:pointer;
    padding:3px 4px;border-radius:3px}
  #tree-pane .t-top:hover{background:var(--panel2)}
  #tree-pane ul{list-style:none;padding-left:14px;margin:2px 0}
  #tree-pane li{padding:2px 4px;cursor:pointer;border-radius:3px;
    color:var(--muted)}
  #tree-pane li:hover{background:var(--panel2);color:var(--text)}
  #tree-pane li.active,#tree-pane .t-top.active{background:var(--panel2);color:var(--accent)}
  .search-results{position:absolute;top:46px;right:20px;background:var(--panel);
    border:1px solid var(--border);border-radius:6px;width:340px;max-height:400px;
    overflow-y:auto;display:none;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .search-results.open{display:block}
  .search-results .item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px}
  .search-results .item:hover{background:var(--panel2)}
  .search-results .item .path{color:var(--muted);font-size:11px;margin-top:2px}
  .search-results .item.proj strong{color:var(--accent2)}
  @media(max-width:900px){
    main{grid-template-columns:1fr;grid-template-rows:1fr auto}
    aside{border-left:none;border-top:1px solid var(--border);max-height:50vh}
    #tree-pane{display:none}
  }
</style>
</head>
<body>
<header>
  <h1>Agentic AI Ecosystem</h1>
  <span class="stats" id="stats">loading…</span>
  <div class="search">
    <input id="q" type="text" placeholder="Search categories &amp; projects…" autocomplete="off">
  </div>
  <span class="links">
    <a href="https://github.com/danielrosehill/Agentic-AI-Ecosystem">GitHub</a> ·
    <a href="explore.html">Hub-Spoke</a> ·
    <a href="data/ecosystem.json">JSON</a>
  </span>
</header>
<div id="search-results" class="search-results"></div>
<main>
  <section id="viz">
    <svg id="sunburst"></svg>
    <div id="tree-pane"></div>
    <div class="hint">Click a wedge to zoom · click the centre to zoom out</div>
  </section>
  <aside id="detail"><p class="empty">Select a category to see details.</p></aside>
</main>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script>
(async function(){
  const data = await fetch('data/ecosystem.json').then(r=>r.json());
  function norm(node){
    const kids = (node.children||node.segments||[]).map(norm);
    const projs = (node.examples||[]).map(e=>({name:e.name,url:e.url}));
    return {
      name: node.name || 'Ecosystem',
      short_description: node.short_description||'',
      long_description:  node.long_description||'',
      examples_narrative:node.examples_narrative||'',
      allKids: kids,
      rawProjects: projs
    };
  }
  const tree = norm({name:'Ecosystem',children:data.segments});

  let catCount=0, projCount=0;
  (function count(n,d){
    if(d>0) catCount++;
    projCount += n.rawProjects.length;
    n.allKids.forEach(k=>count(k,d+1));
  })(tree,0);
  document.getElementById('stats').textContent =
    `${data.segments.length} domains · ${catCount} categories · ${projCount} projects`;

  const hierarchy = d3.hierarchy(tree, d=>d.allKids)
    .sum(d=> d.allKids.length ? 0 : Math.max(1, d.rawProjects.length));
  hierarchy.sort((a,b)=> d3.descending(a.value,b.value));

  const color = d3.scaleOrdinal(d3.quantize(d3.interpolateRainbow, data.segments.length+1));
  function topColor(d){
    let n=d; while(n.depth>1) n=n.parent;
    return color(n.data.name);
  }

  const svgSel = d3.select('#sunburst');
  const viz = document.getElementById('viz');
  let W, H, radius, arc, g, path, label, parentCircle, centerText;
  let currentFocus = hierarchy;

  function layout(){
    W = viz.clientWidth; H = viz.clientHeight;
    radius = Math.min(W,H)/2 - 10;
    svgSel.attr('viewBox',[-W/2,-H/2,W,H]).attr('width',W).attr('height',H);
  }

  function render(){
    svgSel.selectAll('*').remove();
    layout();
    d3.partition().size([2*Math.PI, hierarchy.height+1])(hierarchy);
    hierarchy.each(d=> d.current = {x0:d.x0,x1:d.x1,y0:d.y0,y1:d.y1});

    arc = d3.arc()
      .startAngle(d=>d.x0)
      .endAngle(d=>d.x1)
      .padAngle(d=>Math.min((d.x1-d.x0)/2,0.005))
      .padRadius(radius*0.75)
      .innerRadius(d=>d.y0 * radius/(hierarchy.height+1))
      .outerRadius(d=>Math.max(d.y0*radius/(hierarchy.height+1),
                               d.y1*radius/(hierarchy.height+1) - 1));

    function fill(d){
      if(d.depth===0) return '#12161c';
      const c = d3.color(topColor(d));
      c.opacity = Math.max(0.35, 1 - (d.depth-1)*0.16);
      return c.formatRgb();
    }

    g = svgSel.append('g');
    path = g.append('g').selectAll('path')
      .data(hierarchy.descendants().slice(1))
      .join('path')
        .attr('fill', fill)
        .attr('fill-opacity', d=> arcVisible(d.current)?1:0)
        .attr('pointer-events', d=> arcVisible(d.current)?'auto':'none')
        .attr('d', d=>arc(d.current))
        .style('cursor','pointer')
        .on('click',(e,d)=>{ clicked(d); select(d); });
    path.append('title').text(d=> d.ancestors().map(x=>x.data.name).reverse().slice(1).join(' / '));

    label = g.append('g')
      .attr('pointer-events','none')
      .attr('text-anchor','middle')
      .style('user-select','none')
      .style('font','11px -apple-system,sans-serif')
      .style('fill','#fff')
      .selectAll('text')
      .data(hierarchy.descendants().slice(1))
      .join('text')
        .attr('dy','0.35em')
        .attr('fill-opacity', d=> +labelVisible(d.current))
        .attr('transform', d=>labelTransform(d.current))
        .text(d=> truncate(d.data.name, labelRoom(d.current)));

    parentCircle = g.append('circle')
      .datum(hierarchy)
      .attr('r', radius/(hierarchy.height+1))
      .attr('fill','#12161c')
      .attr('stroke','#222a35')
      .attr('pointer-events','all')
      .style('cursor','pointer')
      .on('click',()=>{
        const p = currentFocus.parent || hierarchy;
        clicked(p); select(p);
      });

    centerText = g.append('text')
      .attr('text-anchor','middle')
      .attr('dy','0.35em')
      .style('font','12px sans-serif')
      .style('fill','#8a94a6')
      .style('pointer-events','none')
      .text('Ecosystem');
  }

  function arcVisible(d){ return d.y1<=3 && d.y0>=1 && d.x1>d.x0; }
  function labelVisible(d){ return d.y1<=3 && d.y0>=1 && (d.y1-d.y0)*(d.x1-d.x0)>0.03; }
  function labelRoom(d){
    const r = (d.y0+d.y1)/2 * radius/(hierarchy.height+1);
    const arcLen = (d.x1-d.x0) * r;
    return Math.floor(arcLen/6.5);
  }
  function labelTransform(d){
    const x = (d.x0+d.x1)/2 * 180/Math.PI;
    const y = (d.y0+d.y1)/2 * radius/(hierarchy.height+1);
    return `rotate(${x-90}) translate(${y},0) rotate(${x<180?0:180})`;
  }
  function truncate(s,n){
    if(n<4) return '';
    return s.length>n ? s.slice(0,n-1)+'…' : s;
  }

  function clicked(p){
    currentFocus = p;
    centerText.text(p.depth===0 ? 'Ecosystem' : truncate(p.data.name, 22));
    hierarchy.each(d=>{
      d.target = {
        x0: Math.max(0, Math.min(1, (d.x0 - p.x0)/(p.x1 - p.x0))) * 2*Math.PI,
        x1: Math.max(0, Math.min(1, (d.x1 - p.x0)/(p.x1 - p.x0))) * 2*Math.PI,
        y0: Math.max(0, d.y0 - p.depth),
        y1: Math.max(0, d.y1 - p.depth)
      };
    });
    const t = g.transition().duration(600);
    path.transition(t)
      .tween('data', d=>{
        const i = d3.interpolate(d.current, d.target);
        return tt=> d.current = i(tt);
      })
      .filter(function(d){
        return +this.getAttribute('fill-opacity') || arcVisible(d.target);
      })
      .attr('fill-opacity', d=> arcVisible(d.target)?1:0)
      .attr('pointer-events', d=> arcVisible(d.target)?'auto':'none')
      .attrTween('d', d=>()=> arc(d.current));
    label.filter(function(d){
      return +this.getAttribute('fill-opacity') || labelVisible(d.target);
    }).transition(t)
      .attr('fill-opacity', d=> +labelVisible(d.target))
      .attrTween('transform', d=>()=> labelTransform(d.current))
      .tween('text', function(d){
        const el = this;
        return ()=>{ el.textContent = truncate(d.data.name, labelRoom(d.current)); };
      });
  }

  render();
  let rto;
  window.addEventListener('resize',()=>{ clearTimeout(rto); rto=setTimeout(()=>{ render(); select(currentFocus); },150); });

  function select(d){
    const path = d.ancestors().map(x=>x.data.name).reverse().slice(1);
    renderDetail(d.data, path);
    highlightTree(path);
  }
  function renderDetail(node, path){
    const aside = document.getElementById('detail');
    if(!path.length){
      aside.innerHTML = `
        <div class="crumbs"><span>Home</span></div>
        <h2 class="cat-name">Ecosystem</h2>
        <p class="desc-short">A hand-curated taxonomy of the agentic AI ecosystem — categories are functional slots, projects are evidence.</p>
        <p class="desc-long">Click any wedge to zoom in, or pick a domain from the sidebar. Search jumps directly to categories or opens project links.</p>
        <div class="section-label">Top-level domains (${tree.allKids.length})</div>
        <ul class="children">${tree.allKids.map(k=>`
          <li data-path='${JSON.stringify([k.name])}'>
            <span>${escapeHtml(k.name)}</span>
            <span class="count">${k.allKids.length} sub</span>
          </li>`).join('')}</ul>`;
      bindNav(aside);
      return;
    }
    const crumbs = ['<a data-path="[]">Home</a>'].concat(path.map((p,i)=>
      `<a data-path='${JSON.stringify(path.slice(0,i+1))}'>${escapeHtml(p)}</a>`
    )).join(' <span>/</span> ');
    const short = node.short_description
      ? `<p class="desc-short">${escapeHtml(node.short_description)}</p>` : '';
    const long = node.long_description
      ? `<p class="desc-long">${escapeHtml(node.long_description)}</p>` : '';
    const narrative = node.examples_narrative
      ? `<p class="narrative">${escapeHtml(node.examples_narrative)}</p>` : '';
    const kids = node.allKids.length
      ? `<div class="section-label">Subcategories (${node.allKids.length})</div>
         <ul class="children">${node.allKids.map(k=>{
           const meta=[];
           if(k.allKids.length) meta.push(k.allKids.length+' sub');
           if(k.rawProjects.length) meta.push(k.rawProjects.length+' proj');
           return `<li data-path='${JSON.stringify([...path,k.name])}'>
             <span>${escapeHtml(k.name)}</span>
             <span class="count">${meta.join(' · ')}</span>
           </li>`;
         }).join('')}</ul>` : '';
    const projs = node.rawProjects.length
      ? `<div class="section-label">Projects (${node.rawProjects.length})</div>
         <ul class="projects">${node.rawProjects.map(p=>`
           <li><a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">${escapeHtml(p.name)}</a></li>
         `).join('')}</ul>` : '';
    const emptyNote = (!short && !long) ? '<p class="empty">No description yet.</p>' : '';

    aside.innerHTML = `
      <div class="crumbs">${crumbs}</div>
      <h2 class="cat-name">${escapeHtml(node.name)}</h2>
      ${emptyNote}${short}${long}${narrative}${kids}${projs}
    `;
    bindNav(aside);
  }
  function bindNav(root){
    root.querySelectorAll('[data-path]').forEach(el=>{
      el.addEventListener('click',()=>{
        const p = JSON.parse(el.dataset.path);
        navigateTo(p);
      });
    });
  }
  function navigateTo(path){
    if(!path.length){ clicked(hierarchy); select(hierarchy); return; }
    const target = hierarchy.descendants().find(d=>{
      const p = d.ancestors().map(x=>x.data.name).reverse().slice(1);
      return p.length===path.length && p.every((s,i)=>s===path[i]);
    });
    if(target){ clicked(target); select(target); }
  }
  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  const treePane = document.getElementById('tree-pane');
  function renderTree(){
    treePane.innerHTML = tree.allKids.map(top=>`
      <div class="t-top" data-path='${JSON.stringify([top.name])}'>${escapeHtml(top.name)}</div>
      <ul>${top.allKids.map(sub=>`
        <li data-path='${JSON.stringify([top.name,sub.name])}'>${escapeHtml(sub.name)}</li>
      `).join('')}</ul>
    `).join('');
    treePane.querySelectorAll('[data-path]').forEach(el=>{
      el.addEventListener('click',e=>{
        e.stopPropagation();
        navigateTo(JSON.parse(el.dataset.path));
      });
    });
  }
  function highlightTree(path){
    treePane.querySelectorAll('[data-path]').forEach(el=>{
      const p = JSON.parse(el.dataset.path);
      el.classList.toggle('active',
        p.length<=path.length && p.every((s,i)=>s===path[i]));
    });
  }
  renderTree();

  const index = [];
  (function walk(n, path){
    n.allKids.forEach(k=>{
      const kp = [...path, k.name];
      index.push({type:'cat', name:k.name, path:kp});
      k.rawProjects.forEach(p=> index.push({type:'proj', name:p.name, path:kp, url:p.url}));
      walk(k, kp);
    });
  })(tree, []);

  const qi = document.getElementById('q');
  const results = document.getElementById('search-results');
  qi.addEventListener('input',()=>{
    const q = qi.value.trim().toLowerCase();
    if(!q){ results.classList.remove('open'); return; }
    const hits = index.filter(it=>it.name.toLowerCase().includes(q)).slice(0,30);
    results.innerHTML = hits.length ? hits.map(h=>`
      <div class="item ${h.type==='proj'?'proj':''}" data-type="${h.type}"
           data-path='${JSON.stringify(h.path)}' ${h.url?`data-url="${escapeHtml(h.url)}"`:''}>
        ${h.type==='proj'?'<strong>':''}${escapeHtml(h.name)}${h.type==='proj'?'</strong>':''}
        <div class="path">${h.path.join(' / ')}</div>
      </div>`).join('') : '<div class="item empty">No results</div>';
    results.classList.add('open');
    results.querySelectorAll('.item[data-path]').forEach(el=>{
      el.addEventListener('click',()=>{
        if(el.dataset.type==='proj' && el.dataset.url){
          window.open(el.dataset.url,'_blank');
        }
        navigateTo(JSON.parse(el.dataset.path));
        results.classList.remove('open'); qi.value='';
      });
    });
  });
  document.addEventListener('click',e=>{
    if(!results.contains(e.target) && e.target!==qi) results.classList.remove('open');
  });

  select(hierarchy);
})();
</script>
</body>
</html>
