site_name: Agentic AI Ecosystem
site_description: A hand-curated taxonomy of the agentic AI tooling landscape.
site_url: https://danielrosehill.github.io/Agentic-AI-Ecosystem/
repo_url: https://github.com/danielrosehill/Agentic-AI-Ecosystem
repo_name: danielrosehill/Agentic-AI-Ecosystem
edit_uri: ""

docs_dir: mkdocs_src
site_dir: docs

# Only list the pages we want in the sidebar/top tabs. Deep category pages
# are still built (they live under docs_dir) and are reachable via URL and
# the in-page sub-nav block; they are intentionally omitted from `nav` so
# the sidebar stays flat at the top-level domains.
nav:
  - Home: index.md
  - Explore:
    - Agents: agents/index.md
    - Builders & Platforms: builders-platforms/index.md
    - Context, Memory & Data: context-memory-data/index.md
    - Dev Tools & Skills: dev-tools-skills/index.md
    - Ecosystem: ecosystem/index.md
    - Frameworks & Runtimes: frameworks-runtimes/index.md
    - Interfaces: interfaces/index.md
    - Models & Inference: models-inference/index.md
    - Observability & Evals: observability-evals/index.md
    - Safety & Governance: safety-governance/index.md
    - Tools & Integrations: tools-integrations/index.md
  - About:
    - Overview: about/index.md
    - Schema: about/schema.md

not_in_nav: |
  /agents/**/*
  /builders-platforms/**/*
  /context-memory-data/**/*
  /dev-tools-skills/**/*
  /ecosystem/**/*
  /frameworks-runtimes/**/*
  /interfaces/**/*
  /models-inference/**/*
  /observability-evals/**/*
  /safety-governance/**/*
  /tools-integrations/**/*

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/danielrosehill/Agentic-AI-Ecosystem
